*{box-sizing:border-box;margin:0;padding:0}
.w{font-family:'DM Sans',sans-serif;background:#141a14;min-height:600px;border-radius:16px;overflow:hidden;color:#e0ece0}
.hdr{background:#0d120d;padding:14px 20px;display:flex;align-items:center;gap:14px;border-bottom:1px solid #243024}
.brand{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:#4cda7c;letter-spacing:2px}
.sub{font-size:10px;color:#5a7a5a;letter-spacing:1px;text-transform:uppercase}
.tag{margin-left:auto;font-size:11px;color:#4cda7c;background:rgba(76,218,124,0.1);border:1px solid rgba(76,218,124,0.2);padding:3px 10px;border-radius:20px}
.body{padding:16px 18px}
.sec{font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:2px;color:#5a7a5a;text-transform:uppercase;margin-bottom:10px}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.scard{background:#0d120d;border:1px solid #243024;border-radius:10px;padding:10px 12px}
.scard-lbl{font-size:10px;color:#5a7a5a;text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px}
.scard-val{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:#4cda7c;line-height:1}
.scard-val.red{color:#e85252}
.scard-sub{font-size:10px;color:#5a7a5a;margin-top:2px}
.tabs{display:flex;gap:0;border-bottom:1px solid #243024;margin-bottom:14px;overflow-x:auto;flex-wrap:nowrap}
.tab{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;padding:8px 14px;cursor:pointer;color:#5a7a5a;border-bottom:2px solid transparent;white-space:nowrap;transition:.2s;flex-shrink:0}
.tab:hover{color:#c0dcc0}
.tab.on{color:#4cda7c;border-bottom-color:#4cda7c}
.panel{display:none}
.panel.on{display:block}
.profile{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.pstat{background:#0d120d;border:1px solid #243024;border-radius:10px;padding:12px 14px}
.pstat-lbl{font-size:10px;color:#5a7a5a;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.pstat-val{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;color:#e0ece0;line-height:1}
.pstat-sub{font-size:11px;color:#5a7a5a;margin-top:3px}
.eff-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;margin-top:8px}
.eff-work{background:#4cda7c}
.eff-idle{background:#e85252}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.chart-box{background:#0d120d;border:1px solid #243024;border-radius:10px;padding:12px}
.chart-title{font-size:10px;color:#5a7a5a;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.daily-table{width:100%;border-collapse:collapse;font-size:12px}
.daily-table th{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#5a7a5a;padding:6px 8px;text-align:left;border-bottom:1px solid #243024}
.daily-table td{padding:6px 8px;border-bottom:1px solid #1a261a;color:#c0dcc0;vertical-align:middle}
.daily-table tr:last-child td{border-bottom:none}
.daily-table tr.special td{color:#8aaa8a;font-style:italic}
.badge{display:inline-block;font-size:9px;padding:2px 7px;border-radius:8px;font-weight:500;letter-spacing:.3px}
.b-hi{background:rgba(76,218,124,.15);color:#4cda7c}
.b-mid{background:rgba(250,199,117,.15);color:#fac775}
.b-lo{background:rgba(232,82,82,.15);color:#e85252}
.b-info{background:rgba(100,160,230,.15);color:#80b8f0}
.b-gray{background:rgba(140,160,140,.1);color:#8aaa8a}
.idle-cell{font-size:11px}
.idle-neg{color:#80b8f0}
.idle-pos{color:#e85252}
.avg-row td{border-top:1px solid #243024;color:#4cda7c;font-weight:500}
.mini-bar{display:inline-block;height:3px;border-radius:2px;vertical-align:middle;margin-left:4px}
</style>

const tabs = document.getElementById('tabs');
const panels = document.getElementById('panels');
let charts = {};

team.forEach((t,idx)=>{
  const tab = document.createElement('div');
  tab.className = 'tab' + (idx===0?' on':'');
  tab.textContent = t.nome.split(' ')[0];
  tab.onclick = ()=>switchTab(t.id);
  tabs.appendChild(tab);

  const wPct = (t.horas/(t.horas+Math.max(0,t.ocioso))*100).toFixed(1);
  const iPct = (Math.max(0,t.ocioso)/(t.horas+Math.max(0,t.ocioso))*100).toFixed(1);

  const rows = t.dias.map(dia=>{
    if(dia.special){
      const label = dia.special==='—'?'–':dia.special;
      const cls = dia.special==='Falta'?'b-lo':dia.special.includes('Feriado')?'b-info':dia.special==='Folga'?'b-gray':dia.special==='Férias'?'b-mid':dia.special==='Atestado'?'b-mid':'b-gray';
      return `<tr class="special"><td>Dia ${dia.d}</td><td colspan="4"><span class="badge ${cls}">${label}</span></td></tr>`;
    }
    const idle = dia.i;
    const idleDisp = idle===null?'–':(idle<0?`<span class="idle-neg">${idle.toFixed(2)}h ↑</span>`:`<span class="idle-pos">${idle.toFixed(2)}h</span>`);
    const eff = idle===null?'<span class="badge b-info">Especial</span>':idle<0?'<span class="badge b-hi">Excelente</span>':idle<=1.5?'<span class="badge b-hi">Alta</span>':idle<=3.5?'<span class="badge b-mid">Média</span>':'<span class="badge b-lo">Baixa</span>';
    const obsTag = dia.obs?`<span class="badge b-gray" style="margin-left:4px">${dia.obs}</span>`:'';
    return `<tr><td>Dia ${dia.d}${dia.dw?` <span style="color:#5a7a5a;font-size:10px">${dia.dw}</span>`:''}</td><td>${dia.os}</td><td>${dia.h.toFixed(2)}h</td><td>${idleDisp}</td><td>${eff}${obsTag}</td></tr>`;
  }).join('');

  const panel = document.createElement('div');
  panel.className = 'panel' + (idx===0?' on':'');
  panel.id = 'panel-'+t.id;
  panel.innerHTML = `
    <div class="profile">
      <div class="pstat">
        <div class="pstat-lbl">${t.cargo}</div>
        <div class="pstat-val">${t.nome}</div>
        <div class="eff-bar" style="margin-top:10px">
          <div class="eff-work" style="width:${wPct}%"></div>
          <div class="eff-idle" style="width:${iPct}%"></div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:4px">
          <span style="font-size:10px;color:#4cda7c">${wPct}% produtivo</span>
          <span style="font-size:10px;color:#e85252">${iPct}% ocioso</span>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        <div class="pstat"><div class="pstat-lbl">OS Total</div><div class="pstat-val" style="color:#4cda7c">${t.total}</div><div class="pstat-sub">ordens</div></div>
        <div class="pstat"><div class="pstat-lbl">Horas</div><div class="pstat-val">${t.horas.toFixed(1)}</div><div class="pstat-sub">trabalhadas</div></div>
        <div class="pstat"><div class="pstat-lbl">Ocioso</div><div class="pstat-val" style="color:#e85252">${t.ocioso.toFixed(1)}</div><div class="pstat-sub">horas</div></div>
      </div>
    </div>
    <div class="chart-row">
      <div class="chart-box"><div class="chart-title">OS por dia</div><canvas id="chart-os-${t.id}" height="120"></canvas></div>
      <div class="chart-box"><div class="chart-title">Horas trabalhadas por dia</div><canvas id="chart-h-${t.id}" height="120"></canvas></div>
    </div>
    <div class="sec">Registro Diário Completo</div>
    <div style="overflow-x:auto">
    <table class="daily-table">
      <thead><tr><th>Dia</th><th>OS</th><th>Horas</th><th>Ocioso</th><th>Eficiência / Obs.</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr class="avg-row"><td>Média</td><td>${t.media.os}</td><td>${t.media.h}h</td><td>${t.media.i}h</td><td></td></tr></tfoot>
    </table>
    </div>
  `;
  panels.appendChild(panel);
});

function buildCharts(t){
  if(charts['os-'+t.id]) return;
  const workDays = t.dias.filter(d=>!d.special);
  const labels = workDays.map(d=>'D'+d.d);
  const osData = workDays.map(d=>d.os);
  const hData = workDays.map(d=>d.h);

  const opts = {responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.parsed.y}}},scales:{x:{ticks:{font:{size:9},color:'#5a7a5a'},grid:{color:'#1a261a'}},y:{ticks:{font:{size:9},color:'#5a7a5a'},grid:{color:'#1a261a'}}}};

  charts['os-'+t.id] = new Chart(document.getElementById('chart-os-'+t.id),{
    type:'bar',data:{labels,datasets:[{data:osData,backgroundColor:'rgba(76,218,124,0.7)',borderRadius:3,borderSkipped:false}]},options:{...opts}
  });
  charts['h-'+t.id] = new Chart(document.getElementById('chart-h-'+t.id),{
    type:'line',data:{labels,datasets:[{data:hData,borderColor:'#4cda7c',backgroundColor:'rgba(76,218,124,0.08)',tension:0.3,pointRadius:2,fill:true}]},options:{...opts}
  });
}

function switchTab(id){
  document.querySelectorAll('.tab').forEach((t,i)=>{t.classList.toggle('on',team[i].id===id)});
  document.querySelectorAll('.panel').forEach(p=>{p.classList.toggle('on',p.id==='panel-'+id)});
  buildCharts(team.find(t=>t.id===id));
}

buildCharts(team[0]);
</script>
